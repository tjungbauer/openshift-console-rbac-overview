{{- if .Values.enableConsolePlugin.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "rbac-overview.fullname" . }}-enable-plugin
  namespace: {{ .Values.enableConsolePlugin.jobNamespace }}
  labels:
    {{- include "rbac-overview.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rbac-overview.fullname" . }}-enable-plugin
  labels:
    {{- include "rbac-overview.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups:
      - operator.openshift.io
    resources:
      - consoles
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "rbac-overview.fullname" . }}-enable-plugin
  labels:
    {{- include "rbac-overview.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "rbac-overview.fullname" . }}-enable-plugin
subjects:
  - kind: ServiceAccount
    name: {{ include "rbac-overview.fullname" . }}-enable-plugin
    namespace: {{ .Values.enableConsolePlugin.jobNamespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "rbac-overview.fullname" . }}-enable-plugin
  namespace: {{ .Values.enableConsolePlugin.jobNamespace }}
  labels:
    {{- include "rbac-overview.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: {{ .Values.enableConsolePlugin.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "rbac-overview.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "rbac-overview.fullname" . }}-enable-plugin
      containers:
        - name: enable-console-plugin
          image: {{ .Values.enableConsolePlugin.cliImage | quote }}
          command:
            - /bin/bash
            - -ec
            - |
              PLUGIN="{{ .Values.consolePlugin.name }}"
              CURRENT=$(oc get console.operator cluster -o jsonpath='{.spec.plugins}' 2>/dev/null || echo "[]")
              if echo "$CURRENT" | grep -q "\"$PLUGIN\""; then
                echo "Plugin $PLUGIN is already enabled."
                exit 0
              fi
              oc patch console.operator cluster --type=json -p="[{\"op\":\"add\",\"path\":\"/spec/plugins/-\",\"value\":\"$PLUGIN\"}]"
              echo "Enabled plugin $PLUGIN."
{{- end }}
