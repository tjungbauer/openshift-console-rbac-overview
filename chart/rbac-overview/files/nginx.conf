# OpenShift Console plugin backend — TLS on 9443, non-root (Project Hummingbird).
# Single worker: static files only; "auto" spawns many processes and can OOM small pods.
worker_processes 1;
error_log /dev/stdout info;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  access_log /dev/stdout;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  keepalive_timeout 65;

  # Writable temp paths for non-root nginx (UID 65532 on Hummingbird, 1001 on UBI)
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  server {
    # IPv4 only — [::]:9443 fails on nodes without IPv6 and prevents nginx from starting.
    listen 9443 ssl;
    ssl_certificate /var/cert/tls.crt;
    ssl_certificate_key /var/cert/tls.key;
    root /usr/share/nginx/html;

    # Locale JSON and manifest use stable URLs (no content hash). Prevent stale translations
    # after plugin upgrades while JS bundles already changed.
    location ~ ^/(locales/|plugin-manifest\.json) {
      add_header Cache-Control "no-store, no-cache, must-revalidate" always;
      add_header Pragma "no-cache" always;
      try_files $uri =404;
    }
  }
}
